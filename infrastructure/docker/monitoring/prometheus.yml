global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files: []

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "traefik"
    static_configs:
      - targets: ["traefik:8080"]
    metrics_path: /metrics

  - job_name: "nats"
    static_configs:
      - targets: ["nats:8222"]
    metrics_path: /metrics

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: "responio-billing"
    static_configs:
      - targets: ["billing:3001"]
    metrics_path: /metrics

  - job_name: "responio-workflow"
    static_configs:
      - targets: ["workflow:3002"]
    metrics_path: /metrics

  - job_name: "responio-ai"
    static_configs:
      - targets: ["ai:3003"]
    metrics_path: /metrics

  - job_name: "responio-gateway"
    static_configs:
      - targets: ["gateway:3000"]
    metrics_path: /metrics
